services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=docker-dev-secret-key-at-least-32-characters!!
      - API_BASE_URL=http://host.docker.internal:3001
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
